name: Daily Council Data Scrape

on:
  push:
    branches:
      - main
  schedule:
    # Runs at 04:00 UTC daily
    - cron: '0 4 * * *'
  workflow_dispatch: # Allows you to manually click "Run" anytime inside GitHub

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Project Dependencies
      run: npm install axios

    - name: Execute Scraper Script
      run: node index.js

    - name: Deploy Compiled HTML to GitHub Pages
      uses: JamesIves/github-pages-deploy-action@v4
      with:
        folder: . # Deploys the index.html created in the root directory
        branch: gh-pages # Creates a clean deployment branch
